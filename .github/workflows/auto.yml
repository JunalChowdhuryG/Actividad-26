name: despliegue automatico
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"
      - name: ejecutar despliegue automatico
        run: python deploy_auto.py